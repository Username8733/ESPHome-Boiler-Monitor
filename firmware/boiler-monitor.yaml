substitutions:
  device_name: boiler-monitor
  friendly_name: Boiler Monitor
  firmware_version: "0.7.0"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
api:
ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Full firmware is available in earlier versions; this package focuses on documentation.
